services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auditcore}
      POSTGRES_USER: ${POSTGRES_USER:-auditcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditcore} -d ${POSTGRES_DB:-auditcore}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [auditnet]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    networks: [auditnet]

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-auditcore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-auditcore}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-auditcore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-auditcore}
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks: [auditnet]

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on: [backend]
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    networks: [auditnet]

  baileys-bridge:
    build: ./baileys-bridge
    restart: unless-stopped
    networks: [auditnet]

volumes:
  postgres_data:

networks:
  auditnet:
    driver: bridge